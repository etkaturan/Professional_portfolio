<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#070707"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="#3d2608" stroke-width="0.5"/>

  <!-- Amber corner brackets -->
  <path d="M4 4 L4 8" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M4 4 L8 4" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>

  <path d="M28 4 L28 8" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M28 4 L24 4" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>

  <path d="M4 28 L4 24" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M4 28 L8 28" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>

  <path d="M28 28 L28 24" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M28 28 L24 28" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ET text -->
  <text
    x="16"
    y="20"
    font-family="JetBrains Mono, monospace"
    font-size="11"
    font-weight="600"
    fill="#EF9F27"
    text-anchor="middle"
    letter-spacing="1"
  >ET</text>

  <!-- Blinking cursor dot -->
  <rect x="21" y="15" width="1.5" height="6" rx="0.5" fill="#EF9F27" opacity="0.8"/>
</svg>
